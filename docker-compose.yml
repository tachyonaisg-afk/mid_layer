version: "3.9"

services:
  app:
    build: .
    container_name: doctor_app
    ports:
      - "3008:3008"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8
    container_name: doctor_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doctor_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
